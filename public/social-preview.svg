<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F3F6FB"/>
  <rect width="1200" height="630" fill="url(#bgGlow)"/>
  <rect x="48" y="48" width="1104" height="534" rx="28" fill="white" fill-opacity="0.84" stroke="#D8E2EF" stroke-width="2"/>
  <rect x="84" y="84" width="340" height="462" rx="24" fill="url(#panelLeft)" stroke="#D8E2EF"/>
  <rect x="454" y="84" width="662" height="188" rx="24" fill="#0F172A"/>
  <rect x="454" y="302" width="320" height="244" rx="24" fill="white" fill-opacity="0.96" stroke="#D8E2EF"/>
  <rect x="796" y="302" width="320" height="244" rx="24" fill="white" fill-opacity="0.96" stroke="#D8E2EF"/>

  <rect x="116" y="116" width="72" height="72" rx="22" fill="url(#mark)"/>
  <text x="152" y="161" text-anchor="middle" fill="white" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="800">WP</text>

  <text x="116" y="238" fill="#0F172A" font-size="58" font-family="Inter, Arial, sans-serif" font-weight="800">Worker Pay</text>
  <text x="116" y="304" fill="#0F172A" font-size="58" font-family="Inter, Arial, sans-serif" font-weight="800">Tools</text>
  <text x="116" y="362" fill="#5A6B81" font-size="28" font-family="Inter, Arial, sans-serif">Fast calculators for time cards,</text>
  <text x="116" y="402" fill="#5A6B81" font-size="28" font-family="Inter, Arial, sans-serif">overtime, salary conversions,</text>
  <text x="116" y="442" fill="#5A6B81" font-size="28" font-family="Inter, Arial, sans-serif">and paycheck estimates.</text>

  <text x="490" y="148" fill="#7DD3FC" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="800" letter-spacing="1.5">WORKER PAY TOOLS</text>
  <text x="490" y="214" fill="white" font-size="60" font-family="Inter, Arial, sans-serif" font-weight="800">Quick answers for</text>
  <text x="490" y="278" fill="white" font-size="60" font-family="Inter, Arial, sans-serif" font-weight="800">hours and pay.</text>

  <text x="486" y="350" fill="#5A6B81" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">Weekly Time Card</text>
  <rect x="486" y="374" width="256" height="92" rx="18" fill="url(#result)" stroke="#BEE6D5"/>
  <text x="510" y="407" fill="#5A6B81" font-size="16" font-family="Inter, Arial, sans-serif" font-weight="700">Estimated Pay</text>
  <text x="510" y="449" fill="#15803D" font-size="34" font-family="Inter, Arial, sans-serif" font-weight="800">$950.00</text>
  <text x="486" y="501" fill="#0F172A" font-size="22" font-family="Inter, Arial, sans-serif">40 regular hours</text>
  <text x="486" y="535" fill="#0F172A" font-size="22" font-family="Inter, Arial, sans-serif">5 overtime hours</text>

  <text x="828" y="350" fill="#5A6B81" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">Net Pay Estimator</text>
  <rect x="828" y="374" width="256" height="92" rx="18" fill="url(#result)" stroke="#BEE6D5"/>
  <text x="852" y="407" fill="#5A6B81" font-size="16" font-family="Inter, Arial, sans-serif" font-weight="700">Take-home Pay</text>
  <text x="852" y="449" fill="#15803D" font-size="34" font-family="Inter, Arial, sans-serif" font-weight="800">$760.00</text>
  <text x="828" y="501" fill="#0F172A" font-size="22" font-family="Inter, Arial, sans-serif">Gross pay, deductions,</text>
  <text x="828" y="535" fill="#0F172A" font-size="22" font-family="Inter, Arial, sans-serif">salary and overtime tools</text>

  <defs>
    <linearGradient id="mark" x1="116" y1="116" x2="188" y2="188" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="panelLeft" x1="84" y1="84" x2="424" y2="546" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#EEF4FB"/>
    </linearGradient>
    <linearGradient id="result" x1="486" y1="374" x2="486" y2="466" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F1FCF8"/>
      <stop offset="1" stop-color="#ECF9F4"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 36) rotate(130.159) scale(670.142 953.377)">
      <stop stop-color="#DBEAFE"/>
      <stop offset="1" stop-color="#F3F6FB" stop-opacity="0"/>
    </radialGradient>
